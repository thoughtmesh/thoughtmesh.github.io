<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ThoughtMesh</title>

  <style>
    :root {
      --bg: #06080f;
      --fg: #eaeaf0;
      --muted: #8a8f98;

      /* extracted from logo */
      --blue: #3aa0ff;
      --purple: #a855f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #0a0f1f, #06080f 60%);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 640px;
      padding: 100px 20px;
      text-align: center;
    }

    img {
      width: 120px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 0.3em;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .tagline {
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1rem;
      margin-bottom: 2.5em;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 1.4em;
    }

    .main {
      color: var(--fg);
    }

    .footer {
      margin-top: 3em;
      font-size: 0.9rem;
    }

    a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    a:hover {
      border-bottom: 1px solid var(--fg);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- PLACE YOUR ICON FILE HERE -->
    <img src="tm.png" alt="ThoughtMesh logo" />

    <h1>ThoughtMesh</h1>

    <div class="tagline">
      Kubernetes-native agent orchestration
    </div>

    <p class="main">
      ThoughtMesh is a Kubernetes operator for deploying and managing
      autonomous agents as native cluster resources.
    </p>

    <p>
      Early development. Documentation and release coming soon.
    </p>

    <div class="footer">
      <a href="https://github.com/thoughtmesh">GitHub</a>
    </div>

  </div>
</body>
</html>
